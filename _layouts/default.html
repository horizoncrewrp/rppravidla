<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RP Pravidla</title>
    <style>
        /* Hlavní nastavení stránky */
        body {
            background-color: #121212 !important;
            color: #e0e0e0 !important;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
            line-height: 1.6;
        }

        /* Hlavní nadpisy */
        h1, h2, h3 {
            color: #ffffff !important;
            border-bottom: 1px solid #333 !important;
            padding-bottom: 0.3em;
        }

        /* Odkazy */
        a { 
            color: #06d6a0 !important; 
            text-decoration: none;
        }
        a:hover { text-decoration: underline; }

        /* Třída pro ZELENÝ text (Správné příklady) */
        .zelena {
            color: #33ff00 !important;
        }

        /* Třída pro ČERVENÝ text (Špatné příklady / Zákazy) */
        .cervena {
            color: #f50418 !important;
        }

        /* Nová třída pro MODRÝ text (Pojmy / Informace) */
        .modra {
            color: #03cafc !important; /* Herní azurová modrá */
        }
    </style>
</head>
<body>
    {{ content }}
</body>
</html>
